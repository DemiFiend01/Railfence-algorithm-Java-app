<!DOCTYPE html>
<html>
    <head>
        <title>RailFence cipher</title>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    </head>
    <body style="background-color:lightgreen;">
        <h1>RailFence cipher</h1>
        <form action="Form" method="POST">
            <p>Input text: <input type=text size=20 name=inputText required></p>
            <p>Rails: <input type=number name=noOfRails required></p>
            <p>(Rails - positive numerical value smaller or equal to the length of the input text)</p>
            <label for="Mode">Choose a mode:</label>
            <select name="Mode"  id="Mode" required>
              <option value="" disabled selected>Open menu</option>
              <option value="en">Encryption</option>
              <option value="de">Decryption</option>
            </select>
            <br><br>
            <input type="submit" name="run_cipher" style="height:40px;width:120px;background-color:mediumseagreen" value="Run the cipher" /> 
        </form>
        <br>
        <form action="History" method="POST">
            <input type="submit" name="history" style="height:40px;width:120px;background-color:mediumseagreen" value="See the history"  />
        </form>
    </body>
</html>
